server {
    server_name 157-230-93-24.nip.io 157.230.93.24;

    client_max_body_size 50M;

    location = /favicon.ico { access_log off; log_not_found off; }

    # Backend Django Static files
    location /static/ {
        alias /var/www/mindylu/backend/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, no-transform";
    }
    
    location /media/ {
        alias /var/www/mindylu/backend/media/;
        expires 365d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy to Django API
    location /api/ {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }

    # WebSocket Support
    location /ws/ {
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_http_version 1.1;
        proxy_set_header Upgrade "websocket";
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }

    # Serve React Frontend
    location / {
        root /var/www/mindylu/frontend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.html$ {
        root /var/www/mindylu/frontend/dist;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/157-230-93-24.nip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/157-230-93-24.nip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = 157-230-93-24.nip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name 157-230-93-24.nip.io 157.230.93.24;
    return 301 https://$host$request_uri;
}
